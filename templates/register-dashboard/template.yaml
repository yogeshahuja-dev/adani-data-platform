apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: register-dashboard
  title: Register New Dashboard
  description: Register a new Databricks SQL Dashboard. Creates a GitHub repo and auto-registers in Backstage.
  tags:
    - dashboard
    - register
spec:
  owner: edl-platform-team
  type: dashboard
  parameters:
    - title: Dashboard Details
      required:
        - dashboardName
        - dashboardTitle
        - description
        - businessSystem
        - environment
      properties:
        dashboardName:
          title: Dashboard Identifier
          type: string
          description: Lowercase with hyphens only (e.g. executive-overview, port-ops-dashboard)
          pattern: '^[a-z0-9-]+$'
        dashboardTitle:
          title: Dashboard Display Name
          type: string
          description: Human-readable name (e.g. Executive Overview, Port Operations)
        description:
          title: Description
          type: string
          ui:widget: textarea
          description: What KPIs/metrics does this dashboard show?
        businessSystem:
          title: Business System
          type: string
          enum:
            - edl-corp-group-it
            - bdl-nr
            - bdl-cements
            - bdl-hr
            - bdl-agel
            - bdl-port
            - bdl-realty
            - bdl-ailabs
          enumNames:
            - EDL - Corp Group IT
            - BDL - Natural Resources (NR)
            - BDL - Cements
            - BDL - Human Resources
            - BDL - Adani Green Energy (AGEL)
            - BDL - Ports and SEZ
            - BDL - Realty
            - BDL - AI Labs
        environment:
          title: Environment
          type: string
          enum:
            - dev
            - prod
          enumNames:
            - Development
            - Production
        audience:
          title: Target Audience
          type: string
          description: e.g. CXO, Operations team, Plant managers
          default: Business stakeholders
  steps:
    - id: fetch
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.businessSystem }}-${{ parameters.environment }}-${{ parameters.dashboardName }}
          title: ${{ parameters.dashboardTitle }}
          description: ${{ parameters.description }}
          system: ${{ parameters.businessSystem }}
          environment: ${{ parameters.environment }}
          owner: ${{ parameters.businessSystem }}-team
          lifecycle: ${{ parameters.environment }}
          audience: ${{ parameters.audience }}
    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: github.com?owner=yogeshahuja-dev&repo=${{ parameters.businessSystem }}-${{ parameters.environment }}-${{ parameters.dashboardName }}
        description: "Dashboard: ${{ parameters.dashboardTitle }} (${{ parameters.businessSystem }} - ${{ parameters.environment }})"
        defaultBranch: main
        repoVisibility: public
    - id: register
      name: Register in Backstage
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml
  output:
    links:
      - title: View Repository
        url: ${{ steps['publish'].output.remoteUrl }}
      - title: View in Catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}