apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: register-dashboard
  title: Register New Dashboard
  description: Register a new Databricks SQL Dashboard in the catalog. Select the business system and workspace environment.
  tags:
    - dashboard
    - register
spec:
  owner: adani-group
  type: dashboard
  parameters:
    - title: Dashboard Details
      required:
        - dashboardName
        - dashboardTitle
        - description
        - businessSystem
        - environment
        - dashboardUrl
      properties:
        dashboardName:
          title: Dashboard Identifier
          type: string
          description: Lowercase with hyphens only (e.g. executive-overview, port-ops-dashboard)
          pattern: '^[a-z0-9-]+$'
        dashboardTitle:
          title: Dashboard Display Name
          type: string
          description: Human-readable name (e.g. Executive Overview, Port Operations)
        description:
          title: Description
          type: string
          ui:widget: textarea
          description: What KPIs/metrics does this dashboard show? Who is the audience?
        businessSystem:
          title: Business System
          type: string
          enum:
            - edl-corp-group-it
            - bdl-nr
            - bdl-cements
            - bdl-hr
            - bdl-agel
            - bdl-port
            - bdl-realty
            - bdl-ailabs
          enumNames:
            - EDL - Corp Group IT
            - BDL - Natural Resources (NR)
            - BDL - Cements
            - BDL - Human Resources
            - BDL - Adani Green Energy (AGEL)
            - BDL - Ports and SEZ
            - BDL - Realty
            - BDL - AI Labs
        environment:
          title: Environment
          type: string
          enum:
            - dev
            - prod
          enumNames:
            - Development
            - Production
        audience:
          title: Target Audience
          type: string
          description: e.g. CXO, Operations team, Plant managers
          default: Business stakeholders
        dashboardUrl:
          title: Dashboard URL
          type: string
          description: Direct link to the Dashboard in Databricks workspace (paste full URL)
          ui:placeholder: https://adb-xxx.azuredatabricks.net/sql/dashboards/...
  steps:
    - id: log
      name: Register Dashboard
      action: debug:log
      input:
        message: |
          DASHBOARD REGISTERED SUCCESSFULLY!
          =====================================
          Entity Name: ${{ parameters.businessSystem }}-${{ parameters.environment }}-${{ parameters.dashboardName }}
          Title: ${{ parameters.dashboardTitle }}
          System: ${{ parameters.businessSystem }}
          Environment: ${{ parameters.environment }}
          Audience: ${{ parameters.audience }}
          URL: ${{ parameters.dashboardUrl }}
          Description: ${{ parameters.description }}

          Generated catalog-info.yaml:
          ---
          apiVersion: backstage.io/v1alpha1
          kind: Component
          metadata:
            name: ${{ parameters.businessSystem }}-${{ parameters.environment }}-${{ parameters.dashboardName }}
            title: "${{ parameters.dashboardTitle }} (${{ parameters.environment }})"
            links:
              - url: ${{ parameters.dashboardUrl }}
                title: Open Dashboard
                icon: dashboard
          spec:
            type: dashboard
            lifecycle: ${{ parameters.environment }}
            owner: ${{ parameters.businessSystem }}-team
            system: ${{ parameters.businessSystem }}
            dependsOn:
              - resource:${{ parameters.businessSystem }}-${{ parameters.environment }}-workspace

          Next: This YAML will be pushed to GitHub and auto-registered.
        listWorkspace: true
  output:
    links:
      - title: Open Dashboard
        icon: dashboard
        url: ${{ parameters.dashboardUrl }}
      - title: View All Dashboards
        icon: catalog
        url: /catalog?filters[kind]=component&filters[type]=dashboard