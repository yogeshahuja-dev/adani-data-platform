apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: register-genie
  title: Register New Genie Agent
  description: Register a new Databricks Genie AI Agent in the catalog. Select the business system and workspace environment.
  tags:
    - genie
    - ai-agent
    - register
spec:
  owner: adani-group
  type: genie
  parameters:
    - title: Genie Details
      required:
        - genieName
        - genieTitle
        - description
        - businessSystem
        - environment
        - domain
        - genieUrl
      properties:
        genieName:
          title: Genie Identifier
          type: string
          description: Lowercase with hyphens only (e.g. finance-genie, vessel-ops-genie)
          pattern: '^[a-z0-9-]+$'
        genieTitle:
          title: Genie Display Name
          type: string
          description: Human-readable name (e.g. Finance Genie, Vessel Ops Genie)
        description:
          title: Description
          type: string
          ui:widget: textarea
          description: What does this Genie do? What data can users query?
        businessSystem:
          title: Business System
          type: string
          enum:
            - edl-corp-group-it
            - bdl-nr
            - bdl-cements
            - bdl-hr
            - bdl-agel
            - bdl-port
            - bdl-realty
            - bdl-ailabs
          enumNames:
            - EDL - Corp Group IT
            - BDL - Natural Resources (NR)
            - BDL - Cements
            - BDL - Human Resources
            - BDL - Adani Green Energy (AGEL)
            - BDL - Ports and SEZ
            - BDL - Realty
            - BDL - AI Labs
        environment:
          title: Environment
          type: string
          enum:
            - dev
            - prod
          enumNames:
            - Development
            - Production
        domain:
          title: Domain
          type: string
          description: Business domain (e.g. finance, operations, analytics)
        genieUrl:
          title: Genie URL
          type: string
          description: Direct link to the Genie agent in Databricks workspace (paste full URL)
          ui:placeholder: https://adb-xxx.azuredatabricks.net/genie/spaces/01ef...
  steps:
    - id: log
      name: Register Genie
      action: debug:log
      input:
        message: |
          GENIE REGISTERED SUCCESSFULLY!
          ================================
          Entity Name: ${{ parameters.businessSystem }}-${{ parameters.environment }}-${{ parameters.genieName }}
          Title: ${{ parameters.genieTitle }}
          System: ${{ parameters.businessSystem }}
          Environment: ${{ parameters.environment }}
          Domain: ${{ parameters.domain }}
          URL: ${{ parameters.genieUrl }}
          Description: ${{ parameters.description }}

          Generated catalog-info.yaml:
          ---
          apiVersion: backstage.io/v1alpha1
          kind: Component
          metadata:
            name: ${{ parameters.businessSystem }}-${{ parameters.environment }}-${{ parameters.genieName }}
            title: "${{ parameters.genieTitle }} (${{ parameters.environment }})"
            links:
              - url: ${{ parameters.genieUrl }}
                title: Open Genie
                icon: dashboard
          spec:
            type: genie
            lifecycle: ${{ parameters.environment }}
            owner: ${{ parameters.businessSystem }}-team
            system: ${{ parameters.businessSystem }}
            dependsOn:
              - resource:${{ parameters.businessSystem }}-${{ parameters.environment }}-workspace

          Next: This YAML will be pushed to GitHub and auto-registered.
        listWorkspace: true
  output:
    links:
      - title: Open Genie
        icon: dashboard
        url: ${{ parameters.genieUrl }}
      - title: View All Genies
        icon: catalog
        url: /catalog?filters[kind]=component&filters[type]=genie