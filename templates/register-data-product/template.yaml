apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: register-data-product
  title: Register New Data Product
  description: Register a new Data Product in the catalog. Select the business system, workspace, and details.
  tags:
    - data-product
    - register
spec:
  owner: edl-platform-team
  type: data-product
  parameters:
    - title: Data Product Details
      required:
        - dpName
        - dpTitle
        - description
        - businessSystem
        - environment
        - domain
      properties:
        dpName:
          title: Data Product Identifier
          type: string
          description: Lowercase with hyphens only (e.g. vendor-360, generation-forecast)
          pattern: '^[a-z0-9-]+$'
        dpTitle:
          title: Data Product Display Name
          type: string
          description: Human-readable name (e.g. Vendor 360, Generation Forecast)
        description:
          title: Description
          type: string
          ui:widget: textarea
          description: What data does this product provide? Who consumes it?
        businessSystem:
          title: Business System
          type: string
          enum:
            - edl-corp-group-it
            - bdl-nr
            - bdl-cements
            - bdl-hr
            - bdl-agel
            - bdl-port
            - bdl-realty
            - bdl-ailabs
          enumNames:
            - EDL - Corp Group IT
            - BDL - Natural Resources (NR)
            - BDL - Cements
            - BDL - Human Resources
            - BDL - Adani Green Energy (AGEL)
            - BDL - Ports and SEZ
            - BDL - Realty
            - BDL - AI Labs
        environment:
          title: Environment
          type: string
          enum:
            - dev
            - prod
          enumNames:
            - Development
            - Production
        domain:
          title: Business Domain
          type: string
          description: e.g. procurement, finance, operations, generation
        sla:
          title: SLA
          type: string
          description: e.g. Data refreshed by 9 AM IST daily
          default: Data refreshed by 9 AM IST daily
        consumers:
          title: Consumers
          type: string
          description: Who uses this data product?
          default: Business stakeholders
  steps:
    - id: log
      name: Register Data Product
      action: debug:log
      input:
        message: |
          DATA PRODUCT REGISTERED SUCCESSFULLY!
          ========================================
          Entity Name: ${{ parameters.businessSystem }}-${{ parameters.environment }}-${{ parameters.dpName }}
          Title: ${{ parameters.dpTitle }}
          System: ${{ parameters.businessSystem }}
          Environment: ${{ parameters.environment }}
          Domain: ${{ parameters.domain }}
          SLA: ${{ parameters.sla }}
          Consumers: ${{ parameters.consumers }}
          Description: ${{ parameters.description }}

          Generated catalog-info.yaml:
          ---
          apiVersion: backstage.io/v1alpha1
          kind: Component
          metadata:
            name: ${{ parameters.businessSystem }}-${{ parameters.environment }}-${{ parameters.dpName }}
            title: "${{ parameters.dpTitle }} (${{ parameters.environment }})"
          spec:
            type: data-product
            lifecycle: ${{ parameters.environment }}
            owner: ${{ parameters.businessSystem }}-team
            system: ${{ parameters.businessSystem }}
            dependsOn:
              - resource:${{ parameters.businessSystem }}-${{ parameters.environment }}-workspace

          Next: This YAML will be pushed to GitHub and auto-registered.
        listWorkspace: true
  output:
    links:
      - title: View All Data Products
        icon: catalog
        url: /catalog?filters[kind]=component&filters[type]=data-product